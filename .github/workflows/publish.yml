name: Publish

# Publish to PyPI on a published GitHub Release, via OIDC trusted publishing
# (no API token stored). One-time maintainer setup: register this repository's
# `publish.yml` workflow and the `pypi` environment as a trusted publisher for
# the `aspectkit` project on PyPI (https://docs.pypi.org/trusted-publishers/).

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish to PyPI
    if: ${{ !github.event.release.prerelease }}  # full releases only, not pre-releases
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
