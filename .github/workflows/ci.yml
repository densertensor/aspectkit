name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" openai anthropic google-genai pandas
      - name: Format check
        run: ruff format --check src tests
      - name: Lint
        run: ruff check src tests
      - name: Type-check
        run: python -m mypy
      - name: Test
        run: python -m pytest

  test-ml-extras:
    name: test (transformers + torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with ML extras
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" transformers openai anthropic google-genai pandas
      - name: Test
        run: python -m pytest
